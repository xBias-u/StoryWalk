{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StoryWalk</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">StoryWalk</a>
    <nav>
      <a href="/guides/">Гиды</a>
      <a href="/subscription-demo/">Тарифы (демо)</a>
      {% if user.is_authenticated %}
        <a href="{% url 'profile' %}">Профиль</a>
        <span class="muted">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">{% csrf_token %}<button class="link-btn" type="submit">Выйти</button></form>
      {% else %}
        <a href="{% url 'login' %}">Войти</a>
        <a class="btn btn-sm" href="{% url 'signup' %}">Регистрация</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
