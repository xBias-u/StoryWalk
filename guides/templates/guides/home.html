{% extends 'base.html' %}
{% block content %}
<section class="hero">
  <h1>Аудиогиды по интересным местам</h1>
  <p>StoryWalk — MVP платформы с авторизацией, карточками локаций и встроенным аудио-плеером.</p>
  <div class="actions">
    {% if user.is_authenticated %}
      <a class="btn" href="/guides/">Смотреть гиды</a>
    {% else %}
      <a class="btn" href="{% url 'login' %}">Войти</a>
    {% endif %}
  </div>
</section>
{% endblock %}
